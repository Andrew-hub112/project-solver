<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projectile Solver</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}

.container{
    margin:20px auto;
    width:400px;
}

input, select{
    margin:5px;
    padding:5px;
    width:120px;
}

button{
    padding:8px;
    margin-top:10px;
    cursor:pointer;
}

canvas{
    background:white;
    margin-top:20px;
}
</style>
</head>

<body>

<h2 id="title">Projectile Motion Solver</h2>

<div class="container">

<select id="lang" onchange="setLanguage()">
    <option value="en">English</option>
    <option value="es">Español</option>
</select>

<br>

<label id="label_v0">Initial Speed (m/s)</label><br>
<input id="v0" value="60"><br>

<label id="label_angle">Angle (degrees)</label><br>
<input id="angle" value="30"><br>

<label id="label_y0">Initial Height (m)</label><br>
<input id="y0" value="30"><br>

<button onclick="solve()" id="solve_btn">Solve & Plot</button>

<h3 id="results_title">Results</h3>
<div id="results"></div>

<canvas id="chart" width="400" height="300"></canvas>

</div>

<script>

// 🌐 TRANSLATIONS
const translations = {
    en: {
        title: "Projectile Motion Solver",
        v0: "Initial Speed (m/s)",
        angle: "Angle (degrees)",
        y0: "Initial Height (m)",
        solve: "Solve & Plot",
        results: "Results",
        time: "Time of flight",
        range: "Range",
        height: "Max height",
        impact: "Impact speed"
    },
    es: {
        title: "Simulador de Movimiento Parabólico",
        v0: "Velocidad Inicial (m/s)",
        angle: "Ángulo (grados)",
        y0: "Altura Inicial (m)",
        solve: "Resolver y Graficar",
        results: "Resultados",
        time: "Tiempo de vuelo",
        range: "Alcance",
        height: "Altura máxima",
        impact: "Velocidad de impacto"
    }
};

// 🌐 SET LANGUAGE
function setLanguage(){
    let lang = document.getElementById("lang").value;
    let t = translations[lang];

    document.getElementById("title").innerText = t.title;
    document.getElementById("label_v0").innerText = t.v0;
    document.getElementById("label_angle").innerText = t.angle;
    document.getElementById("label_y0").innerText = t.y0;
    document.getElementById("solve_btn").innerText = t.solve;
    document.getElementById("results_title").innerText = t.results;
}

let chart;

// ⚙️ SOLVER
function solve(){

    let lang = document.getElementById("lang").value;
    let t_text = translations[lang];

    let g = 9.8;

    let v0 = parseFloat(document.getElementById("v0").value);
    let angle = parseFloat(document.getElementById("angle").value) * Math.PI/180;
    let y0 = parseFloat(document.getElementById("y0").value);

    let v0x = v0 * Math.cos(angle);
    let v0y = v0 * Math.sin(angle);

    let a = -0.5 * g;
    let b = v0y;
    let c = y0;

    let discriminant = b*b - 4*a*c;

    let t1 = (-b + Math.sqrt(discriminant)) / (2*a);
    let t2 = (-b - Math.sqrt(discriminant)) / (2*a);

    let t = Math.max(t1, t2);

    let range = v0x * t;

    let t_max = v0y / g;
    let h_max = y0 + v0y*t_max - 0.5*g*t_max*t_max;

    let vy_final = v0y - g*t;
    let v_final = Math.sqrt(v0x*v0x + vy_final*vy_final);

    document.getElementById("results").innerHTML = `
        ${t_text.time}: ${t.toFixed(2)} s<br>
        ${t_text.range}: ${range.toFixed(2)} m<br>
        ${t_text.height}: ${h_max.toFixed(2)} m<br>
        ${t_text.impact}: ${v_final.toFixed(2)} m/s
    `;

    let points = [];
    let N = 100;

    for(let i=0;i<=N;i++){
        let ti = t*i/N;
        let x = v0x * ti;
        let y = y0 + v0y*ti - 0.5*g*ti*ti;
        points.push({x:x, y:y});
    }

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: 'scatter',
        data: {
            datasets: [{
                label: 'Trajectory',
                data: points,
                showLine: true
            }]
        },
        options: {
            scales: {
                x: {
                    type: 'linear',
                    position: 'bottom'
                },
                y: {}
            }
        }
    });
}

// Initialize language on load
setLanguage();

</script>

</body>
</html>
